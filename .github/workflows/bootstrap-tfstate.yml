# =============================================================================
#  .github/workflows/bootstrap-tfstate.yml
#  Bootstrap idempotente do backend remoto do Terraform (RG + Storage Account
#  + container) com Bicep e autenticação OIDC, sem secrets do Azure.
# =============================================================================
name: bootstrap tfstate

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: tfstate-bootstrap-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate and deploy backend
        shell: bash
        run: bash deploy.sh
