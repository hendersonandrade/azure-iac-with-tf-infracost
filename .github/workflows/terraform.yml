# =============================================================================
#  .github/workflows/terraform.yml
#  Pipeline IaC: fmt + validate + plan + Infracost (em PR) e apply (na main).
#  Autenticação SEM SEGREDOS via OpenID Connect (Workload Identity Federation):
#  o GitHub emite um token OIDC de curta duração; o Entra ID confia nesse token
#  por meta de um Federated Credential. Nenhuma senha/secret de client é armazenada.
# =============================================================================
name: terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths: ['bootstrap/**', 'infra/**', 'modules/**', '.github/workflows/**']
  workflow_dispatch:

# Permissões mínimas: id-token p/ OIDC, contents p/ checkout, PRs p/ comentar.
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_USE_OIDC: 'true'
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  WORKING_DIR: infra
  VAR_FILE: dev.tfvars

jobs:
  # ---------------------------------------------------------------------------
  #  BOOTSTRAP — em push na main, garante que o backend exista antes do init.
  #  O workflow chamado também pode ser executado manualmente sob demanda.
  # ---------------------------------------------------------------------------
  bootstrap:
    name: bootstrap tfstate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/bootstrap-tfstate.yml

  # ---------------------------------------------------------------------------
  #  PLAN — roda em todo PR e em todo push. Publica o plano como artefato e
  #  comenta o custo estimado (Infracost) no PR.
  # ---------------------------------------------------------------------------
  plan:
    name: validate & plan
    needs: bootstrap
    if: always() && (needs.bootstrap.result == 'success' || needs.bootstrap.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login no Azure usando o token OIDC — nenhuma client secret envolvida.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'

      - name: Load backend configuration
        shell: bash
        run: |
          set -euo pipefail
          parameters='../bootstrap/main.parameters.json'
          backend_rg="$(jq -er '.parameters.resourceGroupName.value' "${parameters}")"
          backend_sa="$(jq -er '.parameters.storageAccountName.value' "${parameters}")"
          printf 'TF_BACKEND_RG=%s\nTF_BACKEND_SA=%s\n' "${backend_rg}" "${backend_sa}" >> "${GITHUB_ENV}"

      # O backend é configurado em tempo de init (valores não-literais).
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RG}" \
            -backend-config="storage_account_name=${TF_BACKEND_SA}"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -var-file="${VAR_FILE}" -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 5

      # ---- Infracost: publica o resumo no run e comenta o diff no PR --------
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost baseline
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          git worktree add --detach /tmp/infracost-base "${{ github.event.pull_request.base.sha }}"
          infracost breakdown \
            --path=/tmp/infracost-base/infra \
            --terraform-var-file="${VAR_FILE}" \
            --project-name=iacdemo-dev \
            --format=json \
            --out-file=/tmp/infracost-base.json

      - name: Infracost diff
        if: github.event_name == 'pull_request'
        run: |
          infracost diff \
            --path=. \
            --terraform-var-file="${VAR_FILE}" \
            --project-name=iacdemo-dev \
            --compare-to=/tmp/infracost-base.json \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Infracost breakdown
        if: github.event_name != 'pull_request'
        run: |
          infracost breakdown \
            --path=. \
            --terraform-var-file="${VAR_FILE}" \
            --project-name=iacdemo-dev \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Publish Infracost summary
        shell: bash
        run: |
          infracost output \
            --path=/tmp/infracost.json \
            --format=table \
            --no-color | tee /tmp/infracost-table.txt

          {
            echo '## Infracost cost estimate'
            echo
            echo '```text'
            cat /tmp/infracost-table.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Post Infracost comment on PR
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo=$GITHUB_REPOSITORY \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --show-all-projects \
            --behavior=update

  # ---------------------------------------------------------------------------
  #  APPLY — só em push na main, e protegido por um Environment com aprovação
  #  manual. Reusa o plano que o job anterior validou.
  # ---------------------------------------------------------------------------
  apply:
    name: apply
    needs: plan
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # exige reviewers no Settings > Environments
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'

      - name: Load backend configuration
        shell: bash
        run: |
          set -euo pipefail
          parameters='../bootstrap/main.parameters.json'
          backend_rg="$(jq -er '.parameters.resourceGroupName.value' "${parameters}")"
          backend_sa="$(jq -er '.parameters.storageAccountName.value' "${parameters}")"
          printf 'TF_BACKEND_RG=%s\nTF_BACKEND_SA=%s\n' "${backend_rg}" "${backend_sa}" >> "${GITHUB_ENV}"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RG}" \
            -backend-config="storage_account_name=${TF_BACKEND_SA}"

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve -var-file="${VAR_FILE}"
